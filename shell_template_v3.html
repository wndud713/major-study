<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과목명 - 챕터명</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e2a;--bg4:#222736;--border:#2a3048;--accent:#38bdf8;--accent2:#a78bfa;--green:#6ee7b7;--red:#f87171;--yellow:#fbbf24;--text:#dce3f0;--text-dim:#7a8aaa;--text-bright:#fff;--tag-bg:#1d2236;--panel-bg:#111420;--sidebar-w:210px;--detail-w:370px;--cards-max-h:45vh;}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;line-height:1.65;display:flex;flex-direction:column}

/* ── Chapter Nav ── */
.chapter-nav{background:#0a0c10;border-bottom:1px solid #1e2235;padding:0 16px;display:flex;align-items:center;gap:4px;height:44px;flex-shrink:0;overflow-x:auto}
.chapter-nav-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:#3a4060;letter-spacing:.1em;margin-right:8px;white-space:nowrap;flex-shrink:0}
.ch-btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 14px;border-radius:5px;border:1px solid #252840;background:transparent;color:#5a6888;cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0}
.ch-btn:hover{background:#13161e;color:#9ab;border-color:#3a3f60}
.ch-btn.active{background:var(--ch-accent,#38bdf8);color:#0a0c10;border-color:transparent;font-weight:600}

/* ── Chapter Section ── */
.chapter-section{display:none;flex:1;flex-direction:column;min-height:0}
.chapter-section.active{display:flex}

/* ── Header ── */
.ch-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 22px 10px;display:flex;align-items:baseline;gap:12px;flex-shrink:0;flex-wrap:wrap}
.ch-badge{font-family:'JetBrains Mono',monospace;font-size:11px;padding:2px 9px;border-radius:4px;letter-spacing:.06em;color:var(--ch-accent,#38bdf8);background:color-mix(in srgb,var(--ch-accent,#38bdf8) 12%,transparent);border:1px solid color-mix(in srgb,var(--ch-accent,#38bdf8) 30%,transparent)}
.ch-header h1{font-size:15px;font-weight:700;color:var(--text-bright)}
.ch-header p{font-size:11px;color:var(--text-dim);margin-left:auto}

/* ── Layout ── */
.wrapper{display:flex;flex:1;min-height:0;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-tabs{flex:1;overflow-y:auto;padding:8px 0}
.tab-group-label{font-size:9px;letter-spacing:.1em;color:var(--text-dim);text-transform:uppercase;padding:10px 16px 4px}
.tab-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 16px;background:none;border:none;color:var(--text-dim);font-size:12.5px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-align:left;transition:all .15s;border-left:2px solid transparent}
.tab-btn:hover{background:var(--bg3);color:var(--text)}
.tab-btn.active{background:var(--bg3);color:var(--ch-accent,#38bdf8);border-left-color:var(--ch-accent,#38bdf8);font-weight:500}
.tab-icon{font-size:14px;flex-shrink:0}
.carousel-toggle-btn{border-left-color:transparent!important}
.carousel-toggle-btn.active{background:var(--bg3)!important;color:var(--ch-accent,#38bdf8)!important;border-left-color:var(--ch-accent,#38bdf8)!important;font-weight:500}

/* ── Main ── */
.main-wrap{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.cards-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.cards-area.carousel-on{flex:none;max-height:var(--cards-max-h);overflow-y:auto}

/* ── Carousel ── */
.carousel-area{display:none;flex-direction:column;min-height:0;border-top:1px solid var(--border);background:var(--bg2)}
.carousel-area.open{display:flex;flex:1}
.carousel-main{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;position:relative;padding:8px;cursor:zoom-in}
.carousel-main img{max-width:100%;max-height:100%;object-fit:contain;border-radius:6px;display:block}
.carousel-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.55);border:1px solid var(--border);color:var(--text);font-size:18px;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .18s;z-index:2}
.carousel-nav:hover{background:color-mix(in srgb,var(--ch-accent,#38bdf8) 35%,transparent)}
.carousel-nav.prev{left:8px}
.carousel-nav.next{right:8px}
.carousel-thumbs{flex-shrink:0;display:flex;gap:6px;padding:8px 12px;overflow-x:auto;border-top:1px solid var(--border);background:#0d0f14}
.carousel-thumb{width:64px;height:48px;object-fit:cover;border-radius:4px;border:2px solid transparent;cursor:pointer;flex-shrink:0;opacity:.65;transition:all .18s}
.carousel-thumb.active{border-color:var(--ch-accent,#38bdf8);opacity:1}
.carousel-label{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:var(--text);font-size:11px;padding:3px 10px;border-radius:10px;white-space:nowrap;pointer-events:none}
.carousel-counter{position:absolute;top:10px;right:12px;background:rgba(0,0,0,.7);color:var(--text);font-size:10px;padding:3px 8px;border-radius:10px;font-family:'JetBrains Mono',monospace;pointer-events:none}

/* ── Lightbox ── */
.lightbox{display:none;position:fixed;top:44px;left:var(--sidebar-w);right:0;bottom:0;background:rgba(0,0,0,.88);z-index:100;align-items:center;justify-content:center;flex-direction:column;cursor:zoom-out;transition:right .2s}
.lightbox.open{display:flex}
.lightbox img{max-width:90%;max-height:85%;object-fit:contain;border-radius:8px;box-shadow:0 0 40px rgba(0,0,0,.8)}
.lightbox-label{color:var(--text);font-size:12px;margin-top:10px;opacity:.8}
.lightbox-close{position:absolute;top:12px;right:16px;background:none;border:1px solid var(--border);color:var(--text-dim);font-size:13px;padding:4px 10px;border-radius:5px;cursor:pointer}
.lightbox-close:hover{color:var(--ch-accent,#38bdf8);border-color:var(--ch-accent,#38bdf8)}

/* ── Detail Panel ── */
.detail-panel{width:var(--detail-w);flex-shrink:0;background:var(--panel-bg);border-left:1px solid var(--border);overflow-y:auto;padding:18px;display:none}
.detail-panel.open{display:block}
.detail-panel h2{font-size:14px;color:var(--ch-accent,#38bdf8);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px}

/* ── Cards ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;transition:border-color .2s,background .2s;cursor:pointer}
.card:hover{border-color:var(--ch-accent,#38bdf8);background:var(--bg3)}
.card-body{flex:1}
.card-title{font-size:13.5px;font-weight:700;color:var(--text-bright);margin-bottom:4px}
.card-sub{font-size:11.5px;color:var(--text-dim);line-height:1.55}
.expand-btn{background:color-mix(in srgb,var(--ch-accent,#38bdf8) 12%,transparent);border:1px solid color-mix(in srgb,var(--ch-accent,#38bdf8) 25%,transparent);color:var(--ch-accent,#38bdf8);border-radius:5px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;flex-shrink:0;transition:background .18s}
.expand-btn:hover{background:color-mix(in srgb,var(--ch-accent,#38bdf8) 28%,transparent)}
.section-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px}
.tab-content{display:none}
.tab-content.active{display:flex;flex-direction:column;gap:12px}

/* ── Detail internals ── */
.detail-section{margin-bottom:16px}
.detail-section h3{font-size:11px;color:var(--accent2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.detail-item{background:var(--bg3);border-radius:6px;padding:9px 12px;margin-bottom:6px;font-size:12px;line-height:1.6;border-left:3px solid var(--border)}
.detail-item.accent{border-left-color:var(--ch-accent,#38bdf8)}
.detail-item.blue{border-left-color:var(--accent2)}
.detail-item.green{border-left-color:var(--green)}
.detail-item.red{border-left-color:var(--red)}
.detail-item.yellow{border-left-color:var(--yellow)}
.detail-item b{color:var(--text-bright)}
.tag{display:inline-block;background:var(--tag-bg);border:1px solid var(--border);color:var(--ch-accent,#38bdf8);font-size:10px;font-family:'JetBrains Mono',monospace;padding:1px 7px;border-radius:3px;margin:2px 2px 2px 0}
.tag.blue{color:var(--accent2);border-color:rgba(167,139,250,.3)}
.tag.green{color:var(--green);border-color:rgba(110,231,183,.3)}
.tag.red{color:var(--red);border-color:rgba(248,113,113,.3)}
.tag.yellow{color:var(--yellow);border-color:rgba(251,191,36,.3)}

/* ── HKA 종합표 (detail-table 표준, v3) ── */
.detail-table{width:100%;border-collapse:collapse;margin:8px 0;font-size:.76rem}
.detail-table th,.detail-table td{padding:6px 14px;border:1px solid var(--border);text-align:left;vertical-align:top}
.detail-table th{background:var(--bg4);color:var(--ch-accent,#38bdf8);font-weight:600}
.detail-table tr:nth-child(even) td{background:color-mix(in srgb,var(--bg3) 50%,transparent)}
.detail-table tr:hover td{background:var(--bg3)}

/* ── Tip / Warn / Step / Timeline ── */
.tip-box{background:color-mix(in srgb,var(--ch-accent,#38bdf8) 10%,transparent);border-left:3px solid var(--ch-accent,#38bdf8);border-radius:4px;padding:10px 14px;font-size:12px;color:var(--text);margin:10px 0}
.tip-box b{color:var(--ch-accent,#38bdf8)}
.warn-box{background:color-mix(in srgb,var(--red) 10%,transparent);border-left:3px solid var(--red);border-radius:4px;padding:10px 14px;font-size:12px;color:var(--text);margin:10px 0}
.warn-box b{color:var(--red)}
.step-flow{display:flex;flex-direction:column;gap:4px;margin:7px 0}
.step-item{background:var(--bg4);border-radius:5px;padding:6px 11px;font-size:12px;border-left:3px solid var(--ch-accent,#38bdf8);position:relative}
.step-item::after{content:'↓';position:absolute;bottom:-13px;left:13px;color:var(--text-dim);font-size:10px}
.step-item:last-child::after{display:none}
.timeline{display:flex;flex-direction:column}
.tl-item{display:flex;gap:12px;padding:6px 0 6px 14px;border-left:2px solid color-mix(in srgb,var(--ch-accent,#38bdf8) 30%,transparent);position:relative}
.tl-item::before{content:'';position:absolute;left:-5px;top:12px;width:8px;height:8px;border-radius:50%;background:var(--ch-accent,#38bdf8);opacity:.7}
.tl-label{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--ch-accent,#38bdf8);min-width:90px;flex-shrink:0}
.tl-body{font-size:12px;color:var(--text-dim)}
.close-btn{display:flex;align-items:center;gap:5px;background:none;border:1px solid var(--border);color:var(--text-dim);font-size:11px;font-family:'Noto Sans KR',sans-serif;padding:4px 10px;border-radius:5px;cursor:pointer;margin-bottom:12px;transition:all .18s}
.close-btn:hover{border-color:var(--ch-accent,#38bdf8);color:var(--ch-accent,#38bdf8)}

/* ── Accordion 부모-자식 (v3) ── */
.accordion-parent{border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-bottom:10px;background:var(--bg2)}
.ap-head{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;background:var(--bg2);transition:background .18s}
.ap-head:hover{background:var(--bg3)}
.ap-icon{font-size:18px;flex-shrink:0}
.ap-title{flex:1;font-size:13px;font-weight:600;color:var(--text-bright)}
.chev{font-size:12px;color:var(--text-dim);transition:transform .2s}
.accordion-parent.expanded .chev{transform:rotate(90deg)}
.accordion-children{max-height:0;overflow:hidden;transition:max-height .3s ease-out}
.accordion-parent.expanded .accordion-children{max-height:5000px;padding:0 14px 14px;border-top:1px solid var(--border)}

/* ── 카드 in-place 확장 (v3) ── */
.card-expand-wrap{max-height:0;overflow:hidden;transition:max-height .3s ease-out;background:var(--bg2);border-radius:0 0 8px 8px}
.card-expand-wrap.open{max-height:10000px;padding:12px 16px;border:1px solid var(--border);border-top:none;margin-top:-6px}
.card.expanded{border-radius:8px 8px 0 0;border-bottom:none}
.card.expanded .card-title{color:var(--ch-accent,#38bdf8)}

/* ── IIFE 토글 종합표 마스터 카드 (v3) ── */
.card.sum-master{background:linear-gradient(135deg,color-mix(in srgb,var(--ch-accent,#38bdf8) 12%,transparent),color-mix(in srgb,var(--accent2) 12%,transparent));border:1.5px solid var(--ch-accent,#38bdf8)}
.sum-inline{background:var(--bg2);border:1px solid var(--border);border-radius:0 0 8px 8px;margin-top:-6px;padding:12px 16px;overflow-x:auto}

/* ── 국시문제 (v3, ROM 패턴) ── */
.exam-question-block{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin:10px 0}
.q-divider{border:none;height:2px;background:linear-gradient(90deg,transparent,var(--ch-accent,#38bdf8),transparent);margin:16px 0;opacity:.4}
.exam-master{background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 12%,transparent),color-mix(in srgb,var(--accent2) 12%,transparent));border:1.5px solid var(--ch-accent,#38bdf8)}
.exam-grid-wrap{max-height:0;overflow:hidden;transition:max-height .35s ease-out}
.exam-grid-wrap.open{max-height:120000px;margin-top:12px}
.exam-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.q-year-sep{grid-column:1 / -1;padding:8px 12px;border-left:3px solid var(--ch-accent,#38bdf8);background:var(--bg2);font-weight:600;color:var(--ch-accent,#38bdf8);font-size:12px}
.q-cell{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px;font-size:12px}
details.q-reveal summary.q-reveal-btn{list-style:none;cursor:pointer;display:inline-block;background:color-mix(in srgb,var(--ch-accent,#38bdf8) 18%,transparent);color:var(--ch-accent,#38bdf8);border:1px solid color-mix(in srgb,var(--ch-accent,#38bdf8) 45%,transparent);border-radius:999px;padding:5px 14px;font-size:11px;font-weight:600;margin-top:8px}
details.q-reveal summary.q-reveal-btn::-webkit-details-marker{display:none}
details.q-reveal summary.q-reveal-btn::before{content:'👁 '}
details.q-reveal[open] summary.q-reveal-btn::before{content:'✅ '}
@media(max-width:1200px){.exam-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:800px){.exam-grid{grid-template-columns:1fr}}

/* ── Resize 핸들 + 편집 모드 (v3) ──
   편집 JS 는 merge-engine.js 의 injectEditFeatures 에서 런타임 주입.
   여기서는 CSS 만 선언 — localStorage · 드래그 · 편집 로직은 주입 JS 참조. */
.resize-handle{width:4px;cursor:ew-resize;background:transparent;transition:background .2s;flex-shrink:0}
.resize-handle:hover{background:var(--accent)}
.del-slide-btn{display:none;position:absolute;top:4px;right:4px;background:rgba(239,68,68,.9);color:#fff;border:none;width:18px;height:18px;border-radius:50%;cursor:pointer;font-size:11px;align-items:center;justify-content:center;z-index:3}
body.edit-mode .del-slide-btn{display:flex!important}

/* ── Mobile ── */
@media(max-width:768px){
  html,body{height:auto;overflow:auto}
  .wrapper{flex-direction:column;overflow:visible}
  .chapter-section{min-height:0}
  .main-wrap{overflow:visible}
  .cards-area{overflow:visible}
  .cards-area.carousel-on{max-height:none;overflow:visible}
  .sidebar{width:100%;height:auto;flex-direction:column;border-right:none;border-bottom:1px solid var(--border)}
  .sidebar-tabs{display:flex;flex-direction:row;overflow-x:auto;overflow-y:hidden;padding:0}
  .tab-group-label{display:none}
  .tab-btn{flex-direction:column;gap:2px;padding:8px 10px;font-size:10px;white-space:nowrap;border-left:none;border-bottom:2px solid transparent;min-width:fit-content}
  .tab-btn.active{border-left:none;border-bottom-color:var(--ch-accent,#38bdf8)}
  .carousel-area.open{height:360px;flex:none}
  .carousel-main{height:260px}
  .detail-panel{width:100%;border-left:none;border-top:1px solid var(--border)}
  .lightbox{left:0;top:44px}
  .ch-header p{display:none}
  .resize-handle{display:none}
}
</style>
</head>
<body>

<!-- ========================================
  CHAPTER NAV BAR
  각 챕터 버튼: data-ch="chN" / --ch-accent 색상 지정
  accent 색상 예시: #38bdf8, #34d399, #4fd1c5, #a78bfa, #fb923c, #c084fc
  ======================================== -->
<div class="chapter-nav">
  <span class="chapter-nav-label">과목명</span>
  <button class="ch-btn active" onclick="switchChapter('ch1')" data-ch="ch1" style="--ch-accent:#38bdf8">CH.01 챕터명</button>
  <!-- <button class="ch-btn" onclick="switchChapter('ch2')" data-ch="ch2" style="--ch-accent:#34d399">CH.02 챕터명</button> -->
</div>

<!-- ========================================
  CHAPTER SECTION
  챕터 하나당 이 블록 전체 반복
  id="chN" / style의 --ch-accent 일치
  ======================================== -->
<div class="chapter-section active" id="ch1" style="--ch-accent:#38bdf8;--accent2:#a78bfa">
  <div class="ch-header">
    <span class="ch-badge">CH.01</span>
    <h1>챕터 제목</h1>
    <p>과목명 · 신구대학교 · 2026</p>
  </div>
  <div class="wrapper">

    <!-- ── SIDEBAR ── -->
    <nav class="sidebar">
      <div class="sidebar-tabs">
        <div class="tab-group-label">섹션 그룹명</div>
        <button class="tab-btn active" onclick="switchTab('ch1','tab1',this)"><span class="tab-icon">📖</span>탭 이름</button>
        <button class="tab-btn" onclick="switchTab('ch1','tab2',this)"><span class="tab-icon">🔬</span>탭 이름</button>
        <button class="tab-btn" onclick="switchTab('ch1','tab3',this)"><span class="tab-icon">📋</span>탭 이름</button>

        <div class="tab-group-label" style="margin-top:6px;border-top:1px solid var(--border);padding-top:10px;">자료</div>
        <button class="tab-btn carousel-toggle-btn" id="ch1-carousel-toggle-btn" onclick="toggleCarousel('ch1')">
          <span class="tab-icon">🖼️</span>슬라이드 이미지
        </button>
      </div>
    </nav>

    <!-- ── MAIN ── -->
    <div class="main-wrap">
      <div class="cards-area" id="ch1-cards-area">

        <!-- 탭 콘텐츠: id = "chN-tab-탭id" -->
        <div class="tab-content active" id="ch1-tab-tab1">
          <div class="section-title">섹션 라벨 (선택)</div>

          <!-- 기본 카드 (detail-panel 열림) -->
          <div class="card" onclick="openDetail('ch1','key1')">
            <div class="card-body">
              <div class="card-title">카드 제목</div>
              <div class="card-sub">핵심 키워드 · 부제 · 요약</div>
            </div>
            <button class="expand-btn">↗</button>
          </div>

          <!-- 카드 in-place 확장 (v3): toggleCardExpand 호출 + .card-expand-wrap 필수 -->
          <div class="card" onclick="toggleCardExpand(this,'ch1','key2')">
            <div class="card-body">
              <div class="card-title">카드 제목 (in-place 확장)</div>
              <div class="card-sub">같은 자리에서 펼쳐짐</div>
            </div>
            <button class="expand-btn">↙</button>
          </div>
          <div class="card-expand-wrap" data-key="key2"></div>

          <!-- IIFE 토글 종합표 마스터 카드 (v3) -->
          <div class="card sum-master" onclick="(function(btn){var w=btn.nextElementSibling;w.style.display=w.style.display==='block'?'none':'block';})(this)">
            <div class="card-body">
              <div class="card-title">📊 X 종합표 — Y · Z</div>
              <div class="card-sub">탭 최상단 한눈에 보기</div>
            </div>
            <button class="expand-btn">↗</button>
          </div>
          <div class="sum-inline" style="display:none">
            <table class="detail-table">
              <tr><th>항목</th><th>내용</th></tr>
              <tr><td>A</td><td>설명</td></tr>
            </table>
          </div>
        </div>

        <div class="tab-content" id="ch1-tab-tab2">
          <div class="section-title">섹션 라벨</div>

          <!-- Accordion 부모-자식 (v3) -->
          <div class="accordion-parent" onclick="toggleAccordion(this)" aria-expanded="false">
            <div class="ap-head">
              <span class="ap-icon">📂</span>
              <span class="ap-title">부모 아코디언 제목</span>
              <span class="chev">▶</span>
            </div>
            <div class="accordion-children" onclick="event.stopPropagation()">
              <div class="card" onclick="openDetail('ch1','key3')">
                <div class="card-body">
                  <div class="card-title">자식 카드</div>
                  <div class="card-sub">아코디언 내부</div>
                </div>
                <button class="expand-btn">↗</button>
              </div>
            </div>
          </div>
        </div>

        <div class="tab-content" id="ch1-tab-tab3">
          <!-- 국시문제 탭 (v3, ROM 패턴) -->
          <div class="card exam-master" onclick="this.nextElementSibling.classList.toggle('open')">
            <div class="card-body">
              <div class="card-title">🎯 국시 기출문제 모음</div>
              <div class="card-sub">클릭해서 펼치기</div>
            </div>
            <button class="expand-btn">↗</button>
          </div>
          <div class="exam-grid-wrap">
            <div class="exam-grid">
              <div class="q-year-sep">2023년</div>
              <div class="q-cell">
                <div><b>Q1.</b> 문제 내용</div>
                <details class="q-reveal"><summary class="q-reveal-btn">정답 보기</summary>
                  <div style="margin-top:8px;padding:8px;background:var(--bg3);border-radius:4px">
                    <b style="color:var(--green)">정답:</b> 보기 N<br>
                    <span style="font-size:11px;color:var(--text-dim)">해설 내용</span>
                  </div>
                </details>
              </div>
            </div>
          </div>
        </div>

      </div><!-- /cards-area -->

      <!-- ── CAROUSEL ── -->
      <div class="carousel-area" id="ch1-carousel-area">
        <div class="carousel-main" id="ch1-carousel-main" onclick="openLightbox('ch1')">
          <button class="carousel-nav prev" onclick="event.stopPropagation();carouselMove('ch1',-1)">‹</button>
          <img id="ch1-carousel-img" src="" alt="">
          <div class="carousel-label" id="ch1-carousel-label"></div>
          <div class="carousel-counter" id="ch1-carousel-counter"></div>
          <button class="carousel-nav next" onclick="event.stopPropagation();carouselMove('ch1',1)">›</button>
        </div>
        <div class="carousel-thumbs" id="ch1-carousel-thumbs"></div>
      </div>
    </div><!-- /main-wrap -->

    <!-- ── DETAIL PANEL ── -->
    <aside class="detail-panel" id="ch1-detail-panel">
      <button class="close-btn" onclick="closeDetail('ch1')">✕ 닫기</button>
      <div id="ch1-detail-content"></div>
    </aside>

  </div>
</div>


<!-- ── LIGHTBOX (전역 1개) ── -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕ 닫기</button>
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-label" id="lightbox-label"></div>
</div>


<script>
// ════════════════════════════════════════
//  CAROUSEL DATA
// ════════════════════════════════════════
const SLIDES_DATA = {
  ch1: [
    // { src: 'data:image/jpeg;base64,...', label: '슬라이드 1' },
  ],
};

// ════════════════════════════════════════
//  CAROUSEL ENGINE (v2 원본 보존)
// ════════════════════════════════════════
const carouselState = {};

function initCarousel(chid) {
  const slides = SLIDES_DATA[chid] || [];
  if (!slides.length) return;

  carouselState[chid] = { curIdx: 0 };

  const thumbsEl = document.getElementById(chid + '-carousel-thumbs');
  thumbsEl.innerHTML = '';
  slides.forEach((s, i) => {
    const img = document.createElement('img');
    img.className = 'carousel-thumb' + (i === 0 ? ' active' : '');
    img.src = s.src;
    img.alt = s.label;
    img.onclick = () => goTo(chid, i);
    thumbsEl.appendChild(img);
  });

  goTo(chid, 0);
}

function goTo(chid, i) {
  const slides = SLIDES_DATA[chid] || [];
  if (!slides.length) return;
  const n = slides.length;
  i = ((i % n) + n) % n;
  carouselState[chid].curIdx = i;

  document.getElementById(chid + '-carousel-img').src = slides[i].src;
  document.getElementById(chid + '-carousel-label').textContent = slides[i].label;
  const counterEl = document.getElementById(chid + '-carousel-counter');
  if (counterEl) counterEl.textContent = (i + 1) + ' / ' + n;
  document.querySelectorAll('#' + chid + '-carousel-thumbs .carousel-thumb').forEach((t, j) => {
    t.classList.toggle('active', j === i);
  });

  const thumbsEl = document.getElementById(chid + '-carousel-thumbs');
  const th = thumbsEl.children[i];
  if (th) th.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

function carouselMove(chid, dir) {
  const st = carouselState[chid];
  if (!st) return;
  goTo(chid, st.curIdx + dir);
}

function toggleCarousel(chid) {
  const area = document.getElementById(chid + '-carousel-area');
  const cardsArea = document.getElementById(chid + '-cards-area');
  const btn = document.getElementById(chid + '-carousel-toggle-btn');
  const slides = SLIDES_DATA[chid] || [];

  const isOpen = area.classList.contains('open');
  if (isOpen) {
    area.classList.remove('open');
    cardsArea.classList.remove('carousel-on');
    btn.classList.remove('active');
  } else {
    if (!slides.length) {
      alert('등록된 슬라이드 이미지가 없습니다.');
      return;
    }
    area.classList.add('open');
    cardsArea.classList.add('carousel-on');
    btn.classList.add('active');
    if (!carouselState[chid]) initCarousel(chid);
  }
}

// ── 라이트박스 ──
let _lbChid = null;
function openLightbox(chid) {
  const st = carouselState[chid];
  if (!st) return;
  _lbChid = chid;
  const s = (SLIDES_DATA[chid] || [])[st.curIdx];
  if (!s) return;
  document.getElementById('lightbox-img').src = s.src;
  document.getElementById('lightbox-label').textContent = s.label;
  const panelOpen = document.getElementById(chid + '-detail-panel').classList.contains('open');
  const lb = document.getElementById('lightbox');
  lb.style.right = panelOpen ? getComputedStyle(document.documentElement).getPropertyValue('--detail-w') : '0px';
  lb.classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  _lbChid = null;
}

document.addEventListener('keydown', e => {
  const activeChid = document.querySelector('.chapter-section.active')?.id;
  if (!activeChid) return;
  const area = document.getElementById(activeChid + '-carousel-area');
  if (!area?.classList.contains('open')) return;
  if (e.key === 'ArrowLeft') carouselMove(activeChid, -1);
  if (e.key === 'ArrowRight') carouselMove(activeChid, 1);
  if (e.key === 'Escape') closeLightbox();
});

// ════════════════════════════════════════
//  챕터 · 탭 · 상세 패널 (v2 원본 보존)
// ════════════════════════════════════════
function switchChapter(chid) {
  document.querySelectorAll('.chapter-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.ch-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(chid).classList.add('active');
  document.querySelector(`.ch-btn[data-ch="${chid}"]`).classList.add('active');
  document.querySelectorAll('.detail-panel').forEach(p => p.classList.remove('open'));
}

function switchTab(chid, tabId, btn) {
  const ch = document.getElementById(chid);
  ch.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  ch.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById(chid + '-tab-' + tabId);
  if (el) el.classList.add('active');
  btn.classList.add('active');
  closeDetail(chid);
}

function openDetail(chid, key) {
  const content = (allDetailData[chid] || {})[key] || '<p style="color:var(--text-dim)">내용 준비 중</p>';
  document.getElementById(chid + '-detail-content').innerHTML = content;
  document.getElementById(chid + '-detail-panel').classList.add('open');
}
function closeDetail(chid) {
  const p = document.getElementById(chid + '-detail-panel');
  if (p) p.classList.remove('open');
}

// ════════════════════════════════════════
//  Accordion 부모-자식 (v3)
//  같은 레벨 형제 아코디언 자동 닫기 (single-expansion)
// ════════════════════════════════════════
function toggleAccordion(el) {
  const expanded = el.classList.contains('expanded');
  const parent = el.parentElement;
  if (parent) {
    parent.querySelectorAll(':scope > .accordion-parent.expanded').forEach(sib => {
      if (sib !== el) { sib.classList.remove('expanded'); sib.setAttribute('aria-expanded','false'); }
    });
  }
  if (expanded) { el.classList.remove('expanded'); el.setAttribute('aria-expanded','false'); }
  else { el.classList.add('expanded'); el.setAttribute('aria-expanded','true'); }
}

// ════════════════════════════════════════
//  카드 in-place 확장 (v3)
//  카드 클릭 → 바로 다음 .card-expand-wrap 에 allDetailData 콘텐츠 삽입 + open 토글
//  같은 cards-area 내 다른 열린 wrap 자동 닫기 (single-expansion)
// ════════════════════════════════════════
function toggleCardExpand(cardEl, chid, key) {
  const wrap = cardEl.nextElementSibling;
  if (!wrap || !wrap.classList.contains('card-expand-wrap')) return;
  const isOpen = wrap.classList.contains('open');

  // 같은 cards-area 내 다른 열린 wrap 닫기
  const area = cardEl.closest('.cards-area');
  if (area) {
    area.querySelectorAll('.card-expand-wrap.open').forEach(w => {
      if (w !== wrap) {
        w.classList.remove('open');
        const prev = w.previousElementSibling;
        if (prev && prev.classList.contains('card')) prev.classList.remove('expanded');
      }
    });
  }

  if (isOpen) {
    wrap.classList.remove('open');
    cardEl.classList.remove('expanded');
  } else {
    if (!wrap.innerHTML.trim()) {
      const content = (allDetailData[chid] || {})[key] || '<p style="color:var(--text-dim)">내용 준비 중</p>';
      wrap.innerHTML = content;
    }
    wrap.classList.add('open');
    cardEl.classList.add('expanded');
  }
}

// ════════════════════════════════════════
//  DETAIL PANEL DATA
//  각 챕터별로 allDetailData['chN'] = { key: `HTML` }
//  allDetailData 는 openDetail 과 toggleCardExpand 공용으로 사용
//
//  사용 가능한 컴포넌트:
//    .detail-item.accent / .blue / .green / .red / .yellow
//    .detail-table          — HKA 종합표 (font-size 0.76rem, padding 6px 14px)
//    .step-flow > .step-item
//    .timeline > .tl-item
//    .tip-box / .warn-box
//    .tag / .tag.blue / .green / .red / .yellow
//    .accordion-parent      — 부모-자식 구조
//    .exam-grid             — 국시문제 3열 그리드
//    details.q-reveal       — 정답 가리기 토글
// ════════════════════════════════════════
const allDetailData = {};

allDetailData['ch1'] = {

  key1: `<h2>카드 상세 제목</h2>
<div class="detail-section">
  <h3>핵심 개념</h3>
  <div class="detail-item accent"><b>항목:</b> 내용 설명</div>
  <div class="detail-item blue">보조 설명</div>
  <div class="detail-item green">추가 내용</div>
</div>
<div class="tip-box">💡 <b>어원/맥락:</b> 여기에 용어 어원 또는 임상 맥락 설명</div>`,

  key2: `<h2>in-place 확장 예시</h2>
<div class="detail-section">
  <div class="detail-item accent"><b>요점:</b> 한 줄 핵심 정리</div>
</div>
<table class="detail-table">
  <tr><th>항목</th><th>A형</th><th>B형</th></tr>
  <tr><td>특성 1</td><td>내용</td><td>내용</td></tr>
  <tr><td>특성 2</td><td>내용</td><td>내용</td></tr>
</table>`,

  key3: `<h2>자식 카드 내용</h2>
<div class="detail-section">
  <div class="step-flow">
    <div class="step-item">① 첫 번째 단계</div>
    <div class="step-item">② 두 번째 단계</div>
    <div class="step-item">③ 세 번째 단계</div>
  </div>
</div>
<div class="warn-box"><b>⚠️ 주의:</b> 경고 또는 오개념 정정 내용</div>`,

};

// allDetailData['ch2'] = { ... };

// ════════════════════════════════════════
//  편집 기능 참조
//  ── localStorage 자동저장, 탭·카드 텍스트 더블탭 편집,
//     슬라이드 추가/삭제, 사이드바·디테일 패널 리사이즈 핸들 드래그
//  ── 런타임 주입: merge-engine.js 의 injectEditFeatures()
//     CSS 변수 --sidebar-w / --detail-w / --cards-max-h 는 이미 :root 에 선언됨
//     .resize-handle / .del-slide-btn / body.edit-mode 도 이미 CSS 에 선언됨
//  ── template 단독 사용 시 편집 기능은 비활성 (정상 동작)
// ════════════════════════════════════════

</script>
</body>
</html>
